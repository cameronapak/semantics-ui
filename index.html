<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basecoat – Component Preview</title>
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body class="min-h-screen bg-background text-foreground p-8">
    <div class="mx-auto max-w-3xl space-y-8">
      <h1 class="text-3xl font-bold">Basecoat Components</h1>
      <p class="text-muted-foreground">A dev playground for previewing components. Edit this file to test.</p>

      <!-- Button variants -->
      <section class="space-y-4">
        <h2 class="text-xl font-semibold">Buttons</h2>
        <div class="flex flex-wrap gap-2">
          <button class="btn btn-default">Default</button>
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-secondary">Secondary</button>
          <button class="btn btn-destructive">Destructive</button>
          <button class="btn btn-outline">Outline</button>
          <button class="btn btn-ghost">Ghost</button>
          <button class="btn btn-link">Link</button>
        </div>
      </section>

      <!-- Card -->
      <section class="space-y-4">
        <h2 class="text-xl font-semibold">Card</h2>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Card Title</h3>
            <p class="card-description">Card description goes here.</p>
          </div>
          <div class="card-content">
            <p>Card content area.</p>
          </div>
          <div class="card-footer">
            <button class="btn btn-primary">Action</button>
          </div>
        </div>
      </section>

      <!-- Badge -->
      <section class="space-y-4">
        <h2 class="text-xl font-semibold">Badges</h2>
        <div class="flex flex-wrap gap-2">
          <span class="badge badge-default">Default</span>
          <span class="badge badge-secondary">Secondary</span>
          <span class="badge badge-destructive">Destructive</span>
          <span class="badge badge-outline">Outline</span>
        </div>
      </section>

      <!-- Input -->
      <section class="space-y-4">
        <h2 class="text-xl font-semibold">Input</h2>
        <input type="text" class="input" placeholder="Type something..." />
      </section>

      <!-- Alert -->
      <section class="space-y-4">
        <h2 class="text-xl font-semibold">Alert</h2>
        <div class="alert">
          <h4 class="alert-title">Heads up!</h4>
          <p class="alert-description">This is an alert component.</p>
        </div>
      </section>
    </div>

    <script type="module" src="./src/js/basecoat.js"></script>
  </body>
</html>
